name: Windows Build and Upload to Release (Manual Trigger)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag name (e.g. v3.12.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installers (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' ? 'windows-11-arm' : 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86, arm64]
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get external dependencies
        run: |
          cd Tools\msi
          .\get_externals.bat
        shell: cmd

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build installer
        run: |
          .\Tools\msi\buildrelease.bat -${{ matrix.arch }} -o ${{ github.workspace }}\output
        shell: cmd
        env:
          PYTHON: python
          SPHINXBUILD: sphinx-build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ matrix.arch }}
          path: ${{ github.workspace }}\output\**\*

  upload-to-release:
    name: Upload to Release
    needs: build-windows
    runs-on: windows-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}\artifacts

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ github.workspace }}\artifacts\**\*
          tag: ${{ github.event.inputs.release_tag }}
          file_glob: true
          prerelease: ${{ github.event.inputs.prerelease }}
